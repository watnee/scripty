<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Scripty - Team</title>
    <link rel="stylesheet" href="https://unpkg.com/missing.css@1.1.3/dist/missing.min.css">
    <link th:href="@{/css/scripty.css}" rel="stylesheet">
    <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">
</head>
<body hx-boost="true">
    <div th:replace="~{fragments/nav :: nav('teams')}"></div>
    <main>
        <div th:replace="~{fragments/logout :: logout}"></div>
        <nav aria-label="Breadcrumb">
            <ol>
                <li><a th:href="@{/team/list}">Teams</a></li>
                <li aria-current="page" th:text="${viewModel.name}"></li>
            </ol>
        </nav>
        <h1 th:text="${viewModel.name}"></h1>

        <h2>Members</h2>
        <table>
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Name</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="member : ${viewModel.members}">
                    <td th:text="${member.username}"></td>
                    <td th:text="${member.firstName} + ' ' + ${member.lastName}"></td>
                    <td>
                        <a th:href="@{/team/removeMember(teamId=${viewModel.id}, userId=${member.id})}" role="button" _="on click if not confirm('Remove this member?') halt">remove</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <form th:if="${!viewModel.availableUsers.isEmpty()}" th:action="@{/team/addMember}" method="post" style="display: flex; align-items: end; gap: 0.5rem;">
            <input type="hidden" name="teamId" th:value="${viewModel.id}" />
            <label>
                Add Member
                <select name="userId">
                    <option th:each="user : ${viewModel.availableUsers}" th:value="${user.id}" th:text="${user.username} + ' (' + ${user.firstName} + ' ' + ${user.lastName} + ')'"></option>
                </select>
            </label>
            <button type="submit">Add</button>
        </form>

        <h2>Projects</h2>
        <table>
            <thead>
                <tr>
                    <th>Title</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="project : ${viewModel.projects}">
                    <td th:text="${project.title}"></td>
                    <td>
                        <a th:href="@{/team/removeProject(teamId=${viewModel.id}, projectId=${project.id})}" role="button" _="on click if not confirm('Remove this project?') halt">remove</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <form th:if="${!viewModel.availableProjects.isEmpty()}" th:action="@{/team/addProject}" method="post" style="display: flex; align-items: end; gap: 0.5rem;">
            <input type="hidden" name="teamId" th:value="${viewModel.id}" />
            <label>
                Add Project
                <select name="projectId">
                    <option th:each="project : ${viewModel.availableProjects}" th:value="${project.id}" th:text="${project.title}"></option>
                </select>
            </label>
            <button type="submit">Add</button>
        </form>
    </main>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script th:src="@{/js/_hyperscript.min.js}"></script>
</body>
</html>
