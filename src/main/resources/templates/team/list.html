<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Scripty - Teams</title>
    <link rel="stylesheet" href="https://unpkg.com/missing.css@1.1.3/dist/missing.min.css">
    <link th:href="@{/css/scripty.css}" rel="stylesheet">
    <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">
</head>
<body hx-boost="true">
    <div th:replace="~{fragments/nav :: nav('teams')}"></div>
    <main>
        <div th:replace="~{fragments/logout :: logout}"></div>
        <nav aria-label="Breadcrumb">
            <ol>
                <li aria-current="page">Teams</li>
            </ol>
        </nav>
        <h1>Teams</h1>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Members</th>
                    <th>Projects</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="team : ${viewModel.teams}">
                    <td><a th:href="@{/team/show(id=${team.id})}" th:text="${team.name}"></a></td>
                    <td th:text="${team.memberCount}"></td>
                    <td th:text="${team.projectCount}"></td>
                    <td>
                        <a th:href="@{/team/edit(id=${team.id})}" role="button">edit</a>
                        <a th:href="@{/team/delete(id=${team.id})}" role="button" _="on click if not confirm('Are you sure you want to delete this team?') halt">delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <p><a th:href="@{/team/create}" role="button">Create New Team</a></p>
    </main>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script th:src="@{/js/_hyperscript.min.js}"></script>
</body>
</html>
