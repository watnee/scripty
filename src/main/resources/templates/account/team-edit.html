<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Scripty - Edit Team Name</title>
    <link rel="stylesheet" href="https://unpkg.com/missing.css@1.1.3/dist/missing.min.css">
    <link th:href="@{/css/scripty.css}" rel="stylesheet">
    <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">
</head>
<body hx-boost="true">
    <div th:replace="~{fragments/nav :: nav('accounts')}"></div>
    <main>
        <div th:replace="~{fragments/logout :: logout}"></div>
        <nav aria-label="Breadcrumb">
            <ol>
                <li><a th:href="@{/account/list}">Accounts</a></li>
                <li aria-current="page">Edit Team Name</li>
            </ol>
        </nav>
        <h1>Edit Team Name</h1>
        <form th:action="@{/account/team/edit}" method="post" th:object="${commandModel}">
            <label>
                Team Name
                <input type="text" th:field="*{teamName}" />
                <span th:if="${#fields.hasErrors('teamName')}" th:errors="*{teamName}"></span>
            </label>
            <p>
                <a th:href="@{/account/list}" role="button">Cancel</a>
                <button type="submit">Submit</button>
            </p>
        </form>
    </main>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script th:src="@{/js/_hyperscript.min.js}"></script>
</body>
</html>
