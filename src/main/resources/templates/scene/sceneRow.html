<tr xmlns:th="http://www.thymeleaf.org">
    <td><a th:href="@{/scene/show(id=${scene.id})}" style="text-transform: uppercase"><th:block th:if="${not #strings.isEmpty(scene.label)}" th:text="${scene.label + ' '}"></th:block><th:block th:text="${scene.name}"></th:block></a></td>
    <td>
        <span class="nowrap">
            <a th:href="@{/scene/moveDown(id=${scene.id})}" class="move-down" role="button">&#8595;</a>
            <a th:href="@{/scene/moveUp(id=${scene.id})}" class="move-up" role="button">&#8593;</a>
        </span>
    </td>
</tr>
