<form xmlns:th="http://www.thymeleaf.org" th:attr="hx-post=@{/scene/editNameInline}" hx-target="closest .scene-name-wrap" hx-swap="innerHTML" hx-trigger="input delay:500ms from:find input, change from:find select">
    <input type="hidden" name="id" th:value="${commandModel.id}" />
    <input type="hidden" name="projectId" th:value="${commandModel.projectId}" />
    <select name="label" style="font-size: 0.6em; font-weight: normal; vertical-align: middle;">
        <option value="" th:selected="${#strings.isEmpty(commandModel.label)}">— label —</option>
        <option value="INT." th:selected="${commandModel.label == 'INT.'}">INT.</option>
        <option value="EXT." th:selected="${commandModel.label == 'EXT.'}">EXT.</option>
        <option value="INT./EXT." th:selected="${commandModel.label == 'INT./EXT.'}">INT./EXT.</option>
    </select>
    <input type="text" name="name" th:value="${commandModel.name}" style="text-transform: uppercase; font-size: inherit; font-weight: inherit" autofocus _="on keydown[key=='Enter'] halt the event then blur() me then send blur to me" />
</form>
