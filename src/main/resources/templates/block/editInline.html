<form xmlns:th="http://www.thymeleaf.org" th:attr="hx-post=@{/block/editInline}" hx-target="closest .block-content" hx-swap="innerHTML" hx-trigger="input delay:500ms from:find textarea, change from:find select">
    <small class="save-timestamp" style="color: #999; font-size: 0.75em;">Saved <span class="save-time"></span></small>
    <script>document.currentScript.previousElementSibling.querySelector('.save-time').textContent = new Date().toLocaleTimeString();</script>
    <input type="hidden" name="id" th:value="${commandModel.id}" />
    <input type="hidden" name="sceneId" th:value="${commandModel.sceneId}" />
    <p>
        <button type="button" onclick="this.closest('form').querySelector('textarea').focus(); document.execCommand('undo')">&#8592; Undo</button>
        <button type="button" onclick="this.closest('form').querySelector('textarea').focus(); document.execCommand('redo')">Redo &#8594;</button>
    </p>
    <textarea spellcheck="true" rows="1" style="width: 100%; height: 1.5em; min-height: 1.5em; padding: 0.25em;" name="content" th:text="${commandModel.content}"></textarea>
    <input type="hidden" name="personId" th:value="${commandModel.personId}" />
    <label style="display: inline-block; margin-top: 0.5em;">
        Font
        <select name="font">
            <option value="" th:selected="${#strings.isEmpty(commandModel.font)}">Default</option>
            <option value="COURIER_PRIME" th:selected="${commandModel.font == 'COURIER_PRIME'}">Courier Prime</option>
            <option value="ARIAL" th:selected="${commandModel.font == 'ARIAL'}">Arial</option>
            <option value="TIMES_NEW_ROMAN" th:selected="${commandModel.font == 'TIMES_NEW_ROMAN'}">Times New Roman</option>
        </select>
    </label>
</form>
