spring:
  datasource:
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    baseline-on-migrate: true

backup:
  datasource:
    url: ${BACKUP_MYSQL_URL:}
    username: ${BACKUP_MYSQL_USER:}
    password: ${BACKUP_MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  cron: ${BACKUP_CRON:0 0 3 * * *}
